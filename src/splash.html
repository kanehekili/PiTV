<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    font-family: sans-serif;
    user-select: none;
  }
  h1 {
    color: #cc0000;
    font-size: 120px;
    font-weight: 900;
    letter-spacing: 0.05em;
  }
  img {
    width: 300px;
    height: 300px;
    object-fit: contain;
  }
</style>
</head>
<body>
  <h1>PiTV</h1>
  <img src="icons/tv-3d.png" alt="PiTV">
</body>
</html>
