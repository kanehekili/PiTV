<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="clip"><circle cx="32" cy="32" r="26"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc2020"/>
      <stop offset="100%" stop-color="#3a0808"/>
    </radialGradient>
    <radialGradient id="hl" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="28" fill="#1a0505" stroke="#ff2222" stroke-width="2"/>
  <g clip-path="url(#clip)">
    <circle cx="32" cy="32" r="26" fill="url(#bg)"/>
    <ellipse cx="32" cy="32" rx="26" ry="14" fill="url(#hl)"/>
  </g>
  <path d="M 25.5 21 A 13 13 0 1 1 38.5 21"
        fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="32" y1="17" x2="32" y2="29"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
</svg>
